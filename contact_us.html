<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John Suprien | Contact</title>
<link rel="shortcut icon" type="image/png" href="Images/jsfavicon 2.ico">
<link rel="stylesheet" href="my_page_layout.css">
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header class="site-header">
  <div class="brand">
    John Suprien <span>Full Stack Dev</span>
  </div>
  <button class="hamburger" id="menuBtn" aria-label="Toggle navigation" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- ── SLIDE-OUT DRAWER ─────────────────────────────────── -->
<nav class="nav-drawer" id="navDrawer" aria-label="Main Navigation">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="About_me.html">About Me</a></li>
    <li><a href="contact_us.html" class="active">Contact</a></li>
  </ul>
</nav>
<div class="nav-overlay" id="navOverlay"></div>

<!-- ── PAGE ─────────────────────────────────────────────── -->
<div class="page-wrapper">

  <!-- HERO -->
  <div class="contact-hero">
    <h1>Contact</h1>
    <p class="subtitle">Get in touch &mdash; I'll get back to you soon</p>
  </div>

  <!-- FORM -->
  <div class="contact-form-wrapper">
    <form id="contactform" novalidate>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="confirmEmail">Confirm Email <span class="required">*</span></label>
        <input type="email" id="confirmEmail" name="confirmEmail" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What's this about?">
      </div>

      <div class="form-group">
        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
      </div>

      <div class="form-group">
        <button type="submit" class="btn-submit">Send Message</button>
      </div>

      <div class="form-message" id="formMessage"></div>

    </form>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2024 John Suprien &mdash; Chicago, IL</p>
  </footer>

</div>

<!-- Hamburger menu -->
<script src="main.js"></script>
<!-- Contact form validation -->
<script src="contact.js"></script>

</body>
</html>
